<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>現實治療理論 — 投影端</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');

:root {
  --bg: #0c0b09;
  --surface: #161410;
  --border: rgba(255,255,255,0.07);
  --text: #f0ece3;
  --muted: rgba(240,236,227,0.4);
  --gold: #d4a843;
  --g1: #e8a045;
  --g2: #5ba88a;
  --g3: #c0544a;
  --g4: #6b8fc9;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans TC', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── HEADER ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 40px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.header-left { display: flex; align-items: center; gap: 16px; }
.header-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--gold);
}
.header-sub { font-size: 11px; color: var(--muted); letter-spacing: 2px; }
.live-dot {
  display: flex; align-items: center; gap: 8px;
  font-size: 11px; color: var(--muted); letter-spacing: 2px;
}
.dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #4caf50;
  animation: blink 1.5s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ── QUESTION CONTROL ── */
.control-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 40px;
  background: rgba(255,255,255,0.02);
  border-bottom: 1px solid var(--border);
  gap: 12px;
  flex-wrap: wrap;
}
.q-label { font-size: 11px; color: var(--muted); letter-spacing: 2px; white-space: nowrap; }
.q-tabs { display: flex; gap: 6px; }
.q-tab {
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 12px;
  font-weight: 700;
  padding: 7px 16px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all .2s;
  letter-spacing: 1px;
}
.q-tab:hover { border-color: rgba(255,255,255,.2); color: var(--text); }
.q-tab.active { background: var(--gold); color: var(--bg); border-color: var(--gold); }

.ctrl-btns { display: flex; gap: 8px; }
.ctrl-btn {
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 11px;
  font-weight: 700;
  padding: 7px 14px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  letter-spacing: 1px;
  transition: all .2s;
}
.ctrl-btn:hover { border-color: rgba(255,255,255,.2); color: var(--text); }
.ctrl-btn.danger:hover { border-color: var(--g3); color: var(--g3); }

/* ── CURRENT QUESTION DISPLAY ── */
.current-q {
  padding: 24px 40px 16px;
}
.cq-tag { font-size: 10px; letter-spacing: 3px; color: var(--gold); font-weight: 700; margin-bottom: 8px; }
.cq-text {
  font-family: 'Noto Serif TC', serif;
  font-size: 22px;
  font-weight: 700;
  line-height: 1.5;
  color: var(--text);
}

/* ── ANSWERS GRID ── */
.answers-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
  padding: 16px 40px 40px;
}

.group-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  min-height: 200px;
  display: flex;
  flex-direction: column;
  transition: border-color .3s;
}
.group-panel.has-answer { border-color: rgba(255,255,255,.12); }

.gp-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
}
.gp-badge {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  padding: 4px 10px;
  border-radius: 3px;
}
.g1 .gp-badge { background: rgba(232,160,69,.15); color: var(--g1); border: 1px solid rgba(232,160,69,.25); }
.g2 .gp-badge { background: rgba(91,168,138,.15); color: var(--g2); border: 1px solid rgba(91,168,138,.25); }
.g3 .gp-badge { background: rgba(192,84,74,.15); color: var(--g3); border: 1px solid rgba(192,84,74,.25); }
.g4 .gp-badge { background: rgba(107,143,201,.15); color: var(--g4); border: 1px solid rgba(107,143,201,.25); }

.gp-title { font-size: 13px; font-weight: 700; flex: 1; }
.gp-status {
  font-size: 10px;
  letter-spacing: 1px;
  color: var(--muted);
}
.gp-status.submitted { color: #4caf50; }

.gp-body {
  flex: 1;
  padding: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.gp-empty {
  text-align: center;
  color: var(--muted);
  font-size: 12px;
  letter-spacing: 1px;
}
.gp-empty .waiting-dots span {
  display: inline-block;
  animation: bounce 1.2s infinite;
  font-size: 20px;
  color: rgba(255,255,255,.1);
}
.gp-empty .waiting-dots span:nth-child(2) { animation-delay: .2s; }
.gp-empty .waiting-dots span:nth-child(3) { animation-delay: .4s; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }

.gp-answer {
  font-size: 15px;
  line-height: 1.85;
  color: var(--text);
  width: 100%;
  animation: slideIn .4s ease both;
}
@keyframes slideIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

.gp-time {
  padding: 8px 20px 12px;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 1px;
  border-top: 1px solid var(--border);
}

/* ── SCENARIO SIDEBAR ── */
.scenario-bar {
  padding: 0 40px 20px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}
.sc-card {
  background: rgba(255,255,255,.02);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px 14px;
  font-size: 11px;
  line-height: 1.6;
  color: var(--muted);
}
.sc-card strong { display: block; font-size: 10px; letter-spacing: 2px; margin-bottom: 4px; }
.sc-card.g1 strong { color: var(--g1); }
.sc-card.g2 strong { color: var(--g2); }
.sc-card.g3 strong { color: var(--g3); }
.sc-card.g4 strong { color: var(--g4); }

/* ── TIMER ── */
.timer-overlay {
  position: fixed;
  bottom: 28px; right: 36px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  z-index: 50;
  box-shadow: 0 8px 32px rgba(0,0,0,.5);
}
.timer-num {
  font-family: 'Noto Serif TC', serif;
  font-size: 28px;
  font-weight: 900;
  color: var(--gold);
  letter-spacing: 2px;
  min-width: 72px;
}
.timer-num.urgent { color: var(--g3); animation: blink .7s infinite; }
.tbtn {
  font-size: 11px; font-weight: 700;
  padding: 6px 12px; border-radius: 4px;
  border: 1px solid var(--border);
  background: transparent; color: var(--text);
  cursor: pointer; font-family: 'Noto Sans TC', sans-serif;
  transition: all .18s; letter-spacing: 1px;
}
.tbtn:hover { border-color: var(--gold); color: var(--gold); }

@media (max-width: 900px) {
  .answers-grid { grid-template-columns: 1fr; padding: 16px 20px 40px; }
  .scenario-bar { grid-template-columns: repeat(2,1fr); padding: 0 20px 16px; }
  .control-bar, .current-q { padding-left: 20px; padding-right: 20px; }
  .header { padding: 16px 20px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div>
      <div class="header-title">Glasser 現實治療理論</div>
      <div class="header-sub">小組討論 · 即時回應系統 · 投影端</div>
    </div>
  </div>
  <div class="live-dot">
    <div class="dot"></div>
    LIVE
  </div>
</div>

<div class="control-bar">
  <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
    <span class="q-label">討論題：</span>
    <div class="q-tabs">
      <button class="q-tab active" onclick="setQuestion(1)">題目一</button>
      <button class="q-tab" onclick="setQuestion(2)">題目二</button>
      <button class="q-tab" onclick="setQuestion(3)">題目三</button>
    </div>
  </div>
  <div class="ctrl-btns">
    <button class="ctrl-btn danger" onclick="clearAnswers()">清除本題答案</button>
  </div>
</div>

<div class="current-q">
  <div class="cq-tag">當前討論題目</div>
  <div class="cq-text" id="currentQText">—</div>
</div>

<div class="scenario-bar">
  <div class="sc-card g1"><strong>第一組</strong>「都是他先惹我的！」— 小凱動手推人</div>
  <div class="sc-card g2"><strong>第二組</strong>「反正學這個沒用。」— 小敏冷漠抗拒</div>
  <div class="sc-card g3"><strong>第三組</strong>「我已經答應但沒做到。」— 小哲契約失效</div>
  <div class="sc-card g4"><strong>第四組</strong>「全班都在聊為什麼只說我？」— 阿翰說不公平</div>
</div>

<div class="answers-grid">
  <div class="group-panel g1" id="panel-1">
    <div class="gp-header">
      <span class="gp-badge">第一組</span>
      <span class="gp-title">「都是他先惹我的！」</span>
      <span class="gp-status" id="status-1">等待中</span>
    </div>
    <div class="gp-body" id="body-1">
      <div class="gp-empty"><div class="waiting-dots"><span>·</span><span>·</span><span>·</span></div><br>等待小組回傳答案</div>
    </div>
    <div class="gp-time" id="time-1"></div>
  </div>

  <div class="group-panel g2" id="panel-2">
    <div class="gp-header">
      <span class="gp-badge">第二組</span>
      <span class="gp-title">「反正學這個沒用。」</span>
      <span class="gp-status" id="status-2">等待中</span>
    </div>
    <div class="gp-body" id="body-2">
      <div class="gp-empty"><div class="waiting-dots"><span>·</span><span>·</span><span>·</span></div><br>等待小組回傳答案</div>
    </div>
    <div class="gp-time" id="time-2"></div>
  </div>

  <div class="group-panel g3" id="panel-3">
    <div class="gp-header">
      <span class="gp-badge">第三組</span>
      <span class="gp-title">「我已經答應但沒做到。」</span>
      <span class="gp-status" id="status-3">等待中</span>
    </div>
    <div class="gp-body" id="body-3">
      <div class="gp-empty"><div class="waiting-dots"><span>·</span><span>·</span><span>·</span></div><br>等待小組回傳答案</div>
    </div>
    <div class="gp-time" id="time-3"></div>
  </div>

  <div class="group-panel g4" id="panel-4">
    <div class="gp-header">
      <span class="gp-badge">第四組</span>
      <span class="gp-title">「全班都在聊為什麼只說我？」</span>
      <span class="gp-status" id="status-4">等待中</span>
    </div>
    <div class="gp-body" id="body-4">
      <div class="gp-empty"><div class="waiting-dots"><span>·</span><span>·</span><span>·</span></div><br>等待小組回傳答案</div>
    </div>
    <div class="gp-time" id="time-4"></div>
  </div>
</div>

<!-- TIMER -->
<div class="timer-overlay">
  <div class="timer-num" id="timerNum">05:00</div>
  <button class="tbtn" id="timerBtn" onclick="toggleTimer()">▶ 開始</button>
  <button class="tbtn" onclick="resetTimer()">↺</button>
</div>

<script>
// ── FIREBASE ──
const firebaseConfig = {
  apiKey: "AIzaSyCbR0qd9-uN844Ql-ylCi1OduyV_4Oyixc",
  authDomain: "test-463e5.firebaseapp.com",
  databaseURL: "https://test-463e5-default-rtdb.firebaseio.com",
  projectId: "test-463e5",
  storageBucket: "test-463e5.firebasestorage.app",
  messagingSenderId: "431961456444",
  appId: "1:431961456444:web:64147b2a49adc68bffa839"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ── QUESTIONS ──
const questions = {
  1: [
    '身為老師，你的第一句話應該是什麼？為什麼？',
    '這句話背後隱藏了哪種未被滿足的基本需求？',
    '面對「我忘了」，如何不接受藉口又不發火？',
    '老師應該先回應「公不公平」，還是聚焦在當下行為？為什麼？',
  ],
  2: [
    '當學生說「都是他先的 / 沒用 / 我忘了 / 不公平」，如何不接受藉口又不懲罰？',
    '老師如何回應才能引導學生做出「有價值的判斷」？',
    '如何讓學生做出因果判斷，而非道德批判？',
  ],
  3: [
    '如何引導學生做出下次的行動計畫？（步驟四～六）',
    '如果學生一直沒改善，老師應該怎麼辦？（永不放棄的具體做法）',
    '「引導式老師（lead-managing）」在這個情境中如何體現？',
  ],
};

let currentQ = 1;

function setQuestion(q) {
  currentQ = q;
  document.querySelectorAll('.q-tab').forEach((t,i) => t.classList.toggle('active', i+1===q));
  const qTexts = [
    '第一題：情境發生了——你的第一反應是什麼？',
    '第二題：如何引導學生做出「有價值的判斷」？',
    '第三題：接下來的行動計畫與承諾怎麼做？',
  ];
  document.getElementById('currentQText').textContent = qTexts[q-1];
  listenAnswers();
}

// ── FIREBASE LISTENER ──
let currentListener = null;

function listenAnswers() {
  if (currentListener) currentListener();
  const ref = db.ref(`answers/q${currentQ}`);
  const handler = ref.on('value', snap => {
    const data = snap.val() || {};
    [1,2,3,4].forEach(g => {
      const ans = data[`group${g}`];
      const body = document.getElementById(`body-${g}`);
      const status = document.getElementById(`status-${g}`);
      const time = document.getElementById(`time-${g}`);
      const panel = document.getElementById(`panel-${g}`);

      if (ans && ans.text) {
        body.innerHTML = `<div class="gp-answer">${ans.text.replace(/\n/g,'<br>')}</div>`;
        status.textContent = '已回傳 ✓';
        status.className = 'gp-status submitted';
        panel.classList.add('has-answer');
        if (ans.timestamp) {
          const d = new Date(ans.timestamp);
          time.textContent = `回傳時間：${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
        }
      } else {
        body.innerHTML = `<div class="gp-empty"><div class="waiting-dots"><span>·</span><span>·</span><span>·</span></div><br>等待小組回傳答案</div>`;
        status.textContent = '等待中';
        status.className = 'gp-status';
        panel.classList.remove('has-answer');
        time.textContent = '';
      }
    });
  });
  currentListener = () => ref.off('value', handler);
}

function clearAnswers() {
  if (!confirm(`確定要清除第 ${currentQ} 題的所有答案嗎？`)) return;
  db.ref(`answers/q${currentQ}`).remove();
}

// ── TIMER ──
let timerSec = 300, timerRunning = false, timerInterval = null;

function toggleTimer() {
  if (timerRunning) {
    clearInterval(timerInterval);
    timerRunning = false;
    document.getElementById('timerBtn').textContent = '▶ 繼續';
  } else {
    timerRunning = true;
    document.getElementById('timerBtn').textContent = '⏸ 暫停';
    timerInterval = setInterval(() => {
      if (timerSec > 0) { timerSec--; updateTimer(); }
      else { clearInterval(timerInterval); timerRunning = false; }
    }, 1000);
  }
}

function resetTimer() {
  clearInterval(timerInterval);
  timerRunning = false;
  timerSec = 300;
  updateTimer();
  document.getElementById('timerBtn').textContent = '▶ 開始';
  document.getElementById('timerNum').classList.remove('urgent');
}

function updateTimer() {
  const m = Math.floor(timerSec/60), s = timerSec%60;
  document.getElementById('timerNum').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  document.getElementById('timerNum').classList.toggle('urgent', timerSec <= 60 && timerSec > 0);
}

// ── INIT ──
setQuestion(1);
</script>
</body>
</html>
