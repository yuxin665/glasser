<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>現實治療理論 — 小組作答</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');

:root {
  --bg: #0f0e0c;
  --surface: #1a1916;
  --border: rgba(255,255,255,0.08);
  --text: #f0ece3;
  --muted: rgba(240,236,227,0.45);
  --gold: #d4a843;
  --g1: #e8a045;
  --g2: #5ba88a;
  --g3: #c0544a;
  --g4: #6b8fc9;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans TC', sans-serif;
  min-height: 100vh;
  padding-bottom: 40px;
}

/* ── SCREENS ── */
.screen { display: none; }
.screen.active { display: block; }

/* ── SELECT GROUP SCREEN ── */
.sg-header {
  padding: 48px 28px 28px;
  text-align: center;
}
.sg-tag {
  font-size: 10px;
  letter-spacing: 4px;
  color: var(--gold);
  font-weight: 700;
  margin-bottom: 12px;
}
.sg-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 22px;
  font-weight: 900;
  line-height: 1.4;
  margin-bottom: 8px;
}
.sg-sub { font-size: 12px; color: var(--muted); line-height: 1.7; }

.sg-groups {
  padding: 8px 20px 0;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.sg-btn {
  background: var(--surface);
  border-radius: 12px;
  padding: 20px 22px;
  cursor: pointer;
  border: 1.5px solid var(--border);
  transition: all .2s;
  display: flex;
  align-items: flex-start;
  gap: 16px;
  text-align: left;
  width: 100%;
  font-family: 'Noto Sans TC', sans-serif;
}
.sg-btn:active { transform: scale(.98); }

.sg-num {
  font-family: 'Noto Serif TC', serif;
  font-size: 32px;
  font-weight: 900;
  line-height: 1;
  flex-shrink: 0;
}
.g1-btn .sg-num { color: var(--g1); }
.g2-btn .sg-num { color: var(--g2); }
.g3-btn .sg-num { color: var(--g3); }
.g4-btn .sg-num { color: var(--g4); }

.g1-btn { border-color: rgba(232,160,69,.2); }
.g2-btn { border-color: rgba(91,168,138,.2); }
.g3-btn { border-color: rgba(192,84,74,.2); }
.g4-btn { border-color: rgba(107,143,201,.2); }

.g1-btn:hover, .g1-btn:active { background: rgba(232,160,69,.07); border-color: rgba(232,160,69,.4); }
.g2-btn:hover, .g2-btn:active { background: rgba(91,168,138,.07); border-color: rgba(91,168,138,.4); }
.g3-btn:hover, .g3-btn:active { background: rgba(192,84,74,.07); border-color: rgba(192,84,74,.4); }
.g4-btn:hover, .g4-btn:active { background: rgba(107,143,201,.07); border-color: rgba(107,143,201,.4); }

.sg-info { flex: 1; }
.sg-info strong { display: block; font-size: 15px; font-weight: 700; margin-bottom: 4px; color: var(--text); }
.sg-info span { font-size: 12px; color: var(--muted); line-height: 1.5; }

/* ── ANSWER SCREEN ── */
.ans-header {
  padding: 28px 24px 20px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 10;
}
.ans-back {
  font-size: 12px;
  color: var(--muted);
  cursor: pointer;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 6px;
  background: none;
  border: none;
  font-family: 'Noto Sans TC', sans-serif;
  padding: 0;
}
.ans-back:active { color: var(--text); }

.ans-group-badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  padding: 4px 10px;
  border-radius: 3px;
  margin-bottom: 10px;
}
.badge-g1 { background: rgba(232,160,69,.15); color: var(--g1); border: 1px solid rgba(232,160,69,.3); }
.badge-g2 { background: rgba(91,168,138,.15); color: var(--g2); border: 1px solid rgba(91,168,138,.3); }
.badge-g3 { background: rgba(192,84,74,.15); color: var(--g3); border: 1px solid rgba(192,84,74,.3); }
.badge-g4 { background: rgba(107,143,201,.15); color: var(--g4); border: 1px solid rgba(107,143,201,.3); }

.ans-scenario-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 17px;
  font-weight: 700;
  line-height: 1.4;
}

/* question tabs */
.q-tabs-mobile {
  display: flex;
  gap: 6px;
  padding: 16px 24px 0;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.qtm {
  flex-shrink: 0;
  font-size: 12px;
  font-weight: 700;
  padding: 7px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font-family: 'Noto Sans TC', sans-serif;
  transition: all .18s;
  white-space: nowrap;
}
.qtm.active { background: var(--gold); color: var(--bg); border-color: var(--gold); }

/* question body */
.ans-body { padding: 20px 24px; }

.ans-scenario-box {
  border-radius: 10px;
  padding: 16px 18px;
  margin-bottom: 20px;
  border-left: 3px solid;
  background: rgba(255,255,255,.03);
}
.g1-scene { border-color: var(--g1); }
.g2-scene { border-color: var(--g2); }
.g3-scene { border-color: var(--g3); }
.g4-scene { border-color: var(--g4); }

.scene-label { font-size: 10px; letter-spacing: 2px; font-weight: 700; margin-bottom: 6px; }
.g1-scene .scene-label { color: var(--g1); }
.g2-scene .scene-label { color: var(--g2); }
.g3-scene .scene-label { color: var(--g3); }
.g4-scene .scene-label { color: var(--g4); }

.scene-text { font-size: 13px; line-height: 1.8; color: rgba(240,236,227,.75); }

.q-display {
  background: var(--surface);
  border-radius: 10px;
  padding: 16px 18px;
  margin-bottom: 20px;
  border: 1px solid var(--border);
}
.q-display-label { font-size: 10px; letter-spacing: 2px; color: var(--gold); font-weight: 700; margin-bottom: 8px; }
.q-display-text { font-size: 15px; font-weight: 700; line-height: 1.6; font-family: 'Noto Serif TC', serif; }

/* textarea */
.ans-textarea {
  width: 100%;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 15px;
  line-height: 1.75;
  color: var(--text);
  resize: none;
  min-height: 140px;
  outline: none;
  transition: border-color .2s;
  -webkit-appearance: none;
}
.ans-textarea:focus { border-color: var(--gold); }
.ans-textarea::placeholder { color: var(--muted); }

.ans-char { font-size: 11px; color: var(--muted); text-align: right; margin-top: 6px; margin-bottom: 20px; }

/* submit button */
.submit-btn {
  width: 100%;
  background: var(--gold);
  color: var(--bg);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 15px;
  font-weight: 700;
  padding: 16px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all .18s;
  -webkit-appearance: none;
}
.submit-btn:active { transform: scale(.98); opacity: .9; }
.submit-btn:disabled { opacity: .4; pointer-events: none; }
.submit-btn.loading { background: var(--surface); color: var(--muted); }

/* submitted state */
.submitted-box {
  text-align: center;
  padding: 40px 24px;
}
.submitted-icon { font-size: 56px; margin-bottom: 16px; }
.submitted-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 8px;
  color: #4caf50;
}
.submitted-sub { font-size: 13px; color: var(--muted); line-height: 1.7; }
.resubmit-btn {
  margin-top: 24px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 12px;
  padding: 10px 20px;
  border-radius: 8px;
  cursor: pointer;
  letter-spacing: 1px;
}
.resubmit-btn:active { color: var(--text); border-color: rgba(255,255,255,.2); }
</style>
</head>
<body>

<!-- ══ SCREEN 1: SELECT GROUP ══ -->
<div class="screen active" id="screen-select">
  <div class="sg-header">
    <div class="sg-tag">GLASSER · 現實治療理論</div>
    <div class="sg-title">請選擇<br>你的組別</div>
    <div class="sg-sub">選好後輸入討論結果<br>答案會即時出現在投影螢幕上</div>
  </div>

  <div class="sg-groups">
    <button class="sg-btn g1-btn" onclick="selectGroup(1)">
      <div class="sg-num">1</div>
      <div class="sg-info">
        <strong>第一組</strong>
        <span>「都是他先惹我的！」<br>小凱動手推人的情境</span>
      </div>
    </button>
    <button class="sg-btn g2-btn" onclick="selectGroup(2)">
      <div class="sg-num">2</div>
      <div class="sg-info">
        <strong>第二組</strong>
        <span>「反正學這個沒用。」<br>小敏冷漠抗拒的情境</span>
      </div>
    </button>
    <button class="sg-btn g3-btn" onclick="selectGroup(3)">
      <div class="sg-num">3</div>
      <div class="sg-info">
        <strong>第三組</strong>
        <span>「我已經答應但沒做到。」<br>小哲契約失效的情境</span>
      </div>
    </button>
    <button class="sg-btn g4-btn" onclick="selectGroup(4)">
      <div class="sg-num">4</div>
      <div class="sg-info">
        <strong>第四組</strong>
        <span>「全班都在聊為什麼只說我？」<br>阿翰說不公平的情境</span>
      </div>
    </button>
  </div>
</div>

<!-- ══ SCREEN 2: ANSWER ══ -->
<div class="screen" id="screen-answer">
  <div class="ans-header">
    <button class="ans-back" onclick="goBack()">← 重新選組</button>
    <div class="ans-group-badge" id="groupBadge"></div>
    <div class="ans-scenario-title" id="scenarioTitle"></div>
  </div>

  <div class="q-tabs-mobile" id="qTabsMobile"></div>

  <div class="ans-body" id="ansBody"></div>
</div>

<script>
// ── FIREBASE ──
const firebaseConfig = {
  apiKey: "AIzaSyCbR0qd9-uN844Ql-ylCi1OduyV_4Oyixc",
  authDomain: "test-463e5.firebaseapp.com",
  databaseURL: "https://test-463e5-default-rtdb.firebaseio.com",
  projectId: "test-463e5",
  storageBucket: "test-463e5.firebasestorage.app",
  messagingSenderId: "431961456444",
  appId: "1:431961456444:web:64147b2a49adc68bffa839"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ── DATA ──
const groupData = {
  1: {
    title: '「都是他先惹我的！」',
    scenario: '小凱和同學起衝突後動手推人，被帶到老師面前。他交叉雙臂，第一句話就是：「都是他先罵我的，我只是還手。」',
    color: 'g1',
    questions: [
      '身為老師，你的第一句話應該說什麼？為什麼？',
      '當小凱說「都是他先的」，你如何不接受藉口，又不懲罰？',
      '如何引導他做出下次的行動計畫？（步驟四～六）',
    ]
  },
  2: {
    title: '「反正學這個沒用。」',
    scenario: '小敏每次上課都低頭，幾乎不參與。老師問她，她冷冷回：「反正學這個以後也用不到，我為什麼要學？」',
    color: 'g2',
    questions: [
      '這句話背後隱藏了哪種未被滿足的基本需求？',
      '老師如何回應才能引導她做出「有價值的判斷」？',
      '如果她下次還是一樣，老師應該怎麼辦？',
    ]
  },
  3: {
    title: '「我已經答應但沒做到。」',
    scenario: '小哲上週跟老師訂了口頭契約：「下週不再遲交作業。」但這週他又遲交了，進教室還笑嘻嘻地說：「老師對不起，我忘了。」',
    color: 'g3',
    questions: [
      '面對「我忘了」，如何不接受藉口又不發火？',
      '原本的口頭契約失效，步驟四到六要怎麼重啟？',
      '重複多次都沒改善，「永不放棄」的具體做法是什麼？',
    ]
  },
  4: {
    title: '「全班都在聊為什麼只說我？」',
    scenario: '上課時全排學生都在講話，老師點名阿翰，他馬上說：「老師，旁邊的人也在講，你為什麼只叫我起來？這不公平。」',
    color: 'g4',
    questions: [
      '老師應該先回應「公不公平」，還是聚焦在當下行為？為什麼？',
      '如何讓阿翰做出因果關係的判斷，而非道德批判？',
      '「引導式老師（lead-managing）」在這個情境中如何體現？',
    ]
  },
};

// ── STATE ──
let selectedGroup = null;
let currentQ = 1;
let submittedQuestions = {};

// ── GROUP SELECT ──
function selectGroup(g) {
  selectedGroup = g;
  submittedQuestions = {};
  currentQ = 1;
  const data = groupData[g];

  document.getElementById('groupBadge').textContent = `第 ${g} 組`;
  document.getElementById('groupBadge').className = `ans-group-badge badge-${data.color}`;
  document.getElementById('scenarioTitle').textContent = data.title;

  buildQTabs(data);
  renderQuestion(data, 1);

  document.getElementById('screen-select').classList.remove('active');
  document.getElementById('screen-answer').classList.add('active');
  window.scrollTo(0,0);
}

function goBack() {
  document.getElementById('screen-answer').classList.remove('active');
  document.getElementById('screen-select').classList.add('active');
  selectedGroup = null;
}

// ── QUESTION TABS ──
function buildQTabs(data) {
  const container = document.getElementById('qTabsMobile');
  container.innerHTML = data.questions.map((q,i) => `
    <button class="qtm ${i===0?'active':''}" id="qtab-${i+1}" onclick="switchQ(${i+1})">
      題目 ${i+1}
    </button>
  `).join('');
}

function switchQ(q) {
  currentQ = q;
  document.querySelectorAll('.qtm').forEach((t,i) => t.classList.toggle('active', i+1===q));
  renderQuestion(groupData[selectedGroup], q);
}

// ── RENDER QUESTION ──
function renderQuestion(data, q) {
  const qIdx = q - 1;
  const isSubmitted = submittedQuestions[q];
  const sceneClass = `${data.color}-scene`;
  const body = document.getElementById('ansBody');

  if (isSubmitted) {
    body.innerHTML = `
      <div class="submitted-box">
        <div class="submitted-icon">✅</div>
        <div class="submitted-title">已成功送出！</div>
        <div class="submitted-sub">你的答案已出現在<br>投影螢幕上了</div>
        <button class="resubmit-btn" onclick="resetSubmit(${q})">修改答案</button>
      </div>`;
    return;
  }

  body.innerHTML = `
    <div class="ans-scenario-box ${sceneClass}">
      <div class="scene-label">情境說明</div>
      <div class="scene-text">${data.scenario}</div>
    </div>

    <div class="q-display">
      <div class="q-display-label">討論題 ${q}</div>
      <div class="q-display-text">${data.questions[qIdx]}</div>
    </div>

    <textarea class="ans-textarea" id="answerText"
      placeholder="在這裡輸入你們小組討論的答案…"
      oninput="updateChar(this)" maxlength="300"></textarea>
    <div class="ans-char"><span id="charCount">0</span> / 300</div>

    <button class="submit-btn" id="submitBtn" onclick="submitAnswer(${q})">
      送出答案到投影螢幕
    </button>
  `;
}

function updateChar(el) {
  document.getElementById('charCount').textContent = el.value.length;
}

// ── SUBMIT ──
async function submitAnswer(q) {
  const text = document.getElementById('answerText').value.trim();
  if (!text) { alert('請先輸入討論結果！'); return; }

  const btn = document.getElementById('submitBtn');
  btn.textContent = '送出中…';
  btn.classList.add('loading');
  btn.disabled = true;

  try {
    await db.ref(`answers/q${q}/group${selectedGroup}`).set({
      text,
      timestamp: Date.now(),
      group: selectedGroup,
    });
    submittedQuestions[q] = true;
    renderQuestion(groupData[selectedGroup], q);
  } catch(e) {
    btn.textContent = '送出失敗，請再試一次';
    btn.classList.remove('loading');
    btn.disabled = false;
    console.error(e);
  }
}

function resetSubmit(q) {
  submittedQuestions[q] = false;
  renderQuestion(groupData[selectedGroup], q);
}
</script>
</body>
</html>
